# fly.toml app configuration file generated for kneecare-mom on 2026-06-29T18:43:53+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'kneecare-mom'
primary_region = 'jnb'

[build]

[env]
  GOOGLE_GENAI_USE_VERTEXAI = 'FALSE'
  KNEECARE_DATA_DIR = '/data'
  PORT = '8770'
  TZ = 'Africa/Johannesburg'

[[mounts]]
  source = 'data'
  destination = '/data'

[http_service]
  internal_port = 8770
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
